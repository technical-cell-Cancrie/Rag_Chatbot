<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cancrie Chatbot</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      padding: 30px;
    }

    .chat-container {
      max-width: 700px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    #messages {
      height: 400px;
      overflow-y: auto;
      border: 1px solid #ddd;
      padding: 10px;
      margin-bottom: 15px;
    }

    .msg {
      margin-bottom: 10px;
    }

    .user {
      font-weight: bold;
      color: blue;
    }

    .bot {
      font-weight: bold;
      color: green;
    }

    input {
      width: 80%;
      padding: 10px;
    }

    button {
      padding: 10px;
    }
  </style>
</head>

<body>

<div class="chat-container">

  <h2>Cancrie AI Assistant</h2>

  <div id="messages"></div>

  <input
    type="text"
    id="question"
    placeholder="Ask something..."
  />

  <button onclick="sendMessage()">
    Send
  </button>

</div>

<script>

async function sendMessage() {

  const input = document.getElementById("question");

  const question = input.value;

  if (!question) return;

  const messages = document.getElementById("messages");

  messages.innerHTML += `
    <div class="msg">
      <span class="user">You:</span>
      ${question}
    </div>
  `;

  input.value = "";

  const response = await fetch(
    `http://127.0.0.1:8000/chat?q=${encodeURIComponent(question)}`
  );

  const data = await response.json();

  messages.innerHTML += `
    <div class="msg">
      <span class="bot">Bot:</span>
      ${data.response}
    </div>
  `;

  messages.scrollTop = messages.scrollHeight;
}

</script>

</body>
</html>
